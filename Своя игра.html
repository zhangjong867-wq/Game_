<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Своя Игра — Неоновая версия (уровни)</title>
<style>
  :root{
    --bg:#05060a;
    --panel:rgba(255,255,255,0.03);
    --neon1:#0ea5ff;
    --neon2:#ffd166;
    --accent:#ffd166;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:Inter, system-ui, Arial, sans-serif;background:radial-gradient(1200px 600px at 20% 10%, rgba(14,165,255,0.06), transparent), radial-gradient(1000px 500px at 90% 90%, rgba(255,209,102,0.04), transparent),var(--bg);color:#e6eef8;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:980px;max-width:100%;border-radius:14px;padding:18px;background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.006));box-shadow:0 20px 60px rgba(2,6,23,0.7);position:relative;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{margin:0;font-size:20px;letter-spacing:0.6px}
  .controls-row{display:flex;gap:8px;align-items:center}
  button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--accent);padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700}
  button.primary{background:linear-gradient(90deg,var(--neon1),var(--neon2));color:#041028;border:0;box-shadow:0 6px 18px rgba(14,165,255,0.08), 0 0 18px rgba(255,209,102,0.04)}
  .board{display:flex;gap:18px;margin-top:14px;align-items:flex-start}
  .game-area{flex:1;min-width:320px;position:relative}
  canvas{width:100%;height:520px;border-radius:12px;display:block;background:linear-gradient(180deg,#041428,#020612);box-shadow:inset 0 0 80px rgba(14,165,255,0.03)}
  .sidebar{width:300px;flex-shrink:0}
  .panel{background:var(--panel);padding:12px;border-radius:10px}
  .stat{display:flex;justify-content:space-between;padding:6px 0;font-weight:700}
  .hint{font-size:13px;color:rgba(230,238,248,0.75);margin-top:10px}
  .intro{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,rgba(2,6,23,0.6),rgba(2,6,23,0.4));backdrop-filter:blur(6px);z-index:30;flex-direction:column;gap:16px;transition:opacity .5s ease, transform .5s ease}
  .logo{font-size:36px;font-weight:800;letter-spacing:1px;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.06);background:linear-gradient(90deg,var(--neon1),var(--neon2));-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 6px 14px rgba(14,165,255,0.08));transform:translateY(-6px)}
  .subtitle{color:rgba(230,238,248,0.75);font-weight:600}
  .start-btn{padding:12px 20px;border-radius:12px;font-size:16px}
  .small{font-size:13px;color:rgba(230,238,248,0.7)}
  .neon-bar{position:absolute;left:-15%;right:-15%;height:280px;top:-30%;background:radial-gradient(closest-side, rgba(14,165,255,0.06), transparent 30%), radial-gradient(closest-side, rgba(255,209,102,0.03), transparent 30%);transform:rotate(8deg);filter:blur(40px);pointer-events:none}
  .difficulty-buttons{display:flex;gap:10px;margin-top:8px}
  .diff{padding:10px 14px;border-radius:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);min-width:100px}
  .diff.easy{background:rgba(14,165,255,0.06)} .diff.medium{background:rgba(255,209,102,0.04)} .diff.hard{background:rgba(255,100,100,0.03)}
  @media(max-width:880px){.board{flex-direction:column}.sidebar{width:100%}.intro{position:fixed}}
</style>
</head>
<body>
  <div class="card">
    <div class="neon-bar" aria-hidden="true"></div>
    <header>
      <h1>Своя Игра — Неоновая версия</h1>
      <div class="controls-row">
        <button id="muteToggle" class="mute">🔊 Звук</button>
        <button id="pauseToggle" class="ghost">⏸️ Пауза</button>
        <button id="homeBtn" class="ghost">🏠 В меню</button>
        <button id="download" class="primary">Скачать</button>
      </div>
    </header>

    <div class="board">
      <div class="game-area">
        <canvas id="gameCanvas" aria-label="Игровое поле"></canvas>

        <div id="intro" class="intro" role="dialog" aria-modal="true">
          <div style="text-align:center">
            <div class="logo">СВОЯ ИГРА</div>
            <div class="subtitle">Выбери уровень и начни игру</div>
            <div class="difficulty-buttons" role="group" aria-label="Выбор уровня">
              <button class="diff easy" data-diff="easy">🟢 Лёгкий</button>
              <button class="diff medium" data-diff="medium">🟠 Средний</button>
              <button class="diff hard" data-diff="hard">🔴 Сложный</button>
            </div>
          </div>
          <div style="display:flex;gap:10px;align-items:center">
            <button id="startBtn" class="start-btn primary" disabled>Начать игру</button>
            <button id="skipBtn" class="start-btn">Пропустить</button>
          </div>
          <div class="small">Управление: стрелки ← → или тач/мышь. Клик — стрелять. Собирай звезды, избегай врагов.</div>
        </div>

      </div>

      <aside class="sidebar">
        <div class="panel">
          <div class="stat"><div>Очки</div><div id="score">0</div></div>
          <div class="stat"><div>Уровень</div><div id="level">1</div></div>
          <div class="stat"><div>Жизни</div><div id="lives">3</div></div>
          <div class="hint">Выбери сложность в заставке. Можно ставить на паузу (кнопка вверху).</div>
        </div>
      </aside>
    </div>
  </div>

<script>
(() => {
  // Canvas setup
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(320, rect.width) * devicePixelRatio;
    canvas.height = 520 * devicePixelRatio;
    canvas.style.height = '520px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    W = rect.width;
    H = 520;
  }
  window.addEventListener('resize', resize);

  // Game vars
  let W = 900, H = 520;
  let running = false, paused = false;
  let score = 0, level = 1, lives = 3;
  let difficulty = 'medium'; // default until selected
  const ents = {player:null, bullets:[], enemies:[], stars:[]};

  // Difficulty parameters (will be set when chosen)
  const DIFF = {
    easy:   {enemySpawnBase: 130, enemySpeedMul: 0.8, starSpawnBase: 110},
    medium: {enemySpawnBase: 95,  enemySpeedMul: 1.0, starSpawnBase: 150},
    hard:   {enemySpawnBase: 65,  enemySpeedMul: 1.35, starSpawnBase: 190}
  };

  // Player
  const player = {x: 440, y: 520-90, w:46, h:46, speed:6, cooldown:0};
  ents.player = player;

  // Input
  const keys = {};
  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
  let pointerX = null;
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    pointerX = e.clientX - r.left;
  });
  canvas.addEventListener('mouseleave', ()=> pointerX = null);
  canvas.addEventListener('click', ()=> shoot());

  function rectsOverlap(a,b){
    return !(a.x+a.w < b.x || a.x > b.x+b.w || a.y+a.h < b.y || a.y > b.y+b.h);
  }

  // Spawn (use DIFF settings)
  function spawnEnemy(){
    const size = 28 + Math.random()*38;
    const speedMul = DIFF[difficulty].enemySpeedMul || 1;
    ents.enemies.push({x: Math.random()*(W-size), y:-size, w:size, h:size, vy:(1.2 + Math.random()*1.6 + level*0.25) * speedMul});
  }
  function spawnStar(){
    const size = 18;
    const speedMul = DIFF[difficulty].enemySpeedMul || 1;
    ents.stars.push({x: Math.random()*(W-size), y:-size, w:size, h:size, vy:(0.9 + Math.random()*1.2) * (1/speedMul)});
  }

  // Shoot
  function shoot(){
    if(player.cooldown > 0) return;
    ents.bullets.push({x: player.x + player.w/2 -4, y: player.y, w:8, h:12, vy:-9});
    player.cooldown = 12;
    playSfx('shoot');
  }

  // Update
  let enemyTimer=0, starTimer=0;
  function update(){
    if(!running || paused) return;
    // player movement
    if(pointerX !== null){
      const dx = pointerX - (player.x + player.w/2);
      player.x += Math.sign(dx)* Math.min(Math.abs(dx), player.speed);
    } else {
      if(keys['arrowleft'] || keys['a']) player.x -= player.speed;
      if(keys['arrowright'] || keys['d']) player.x += player.speed;
    }
    player.x = Math.max(0, Math.min(W - player.w, player.x));
    if(player.cooldown > 0) player.cooldown--;

    // spawning using difficulty base intervals
    enemyTimer++;
    starTimer++;
    const enemyBase = DIFF[difficulty].enemySpawnBase;
    const starBase = DIFF[difficulty].starSpawnBase;
    if(enemyTimer > Math.max(30, enemyBase - level*6)){ spawnEnemy(); enemyTimer=0; }
    if(starTimer > Math.max(80, starBase - level*8)){ spawnStar(); starTimer=0; }

    // enemies
    for(let i=ents.enemies.length-1;i>=0;i--){
      const e = ents.enemies[i];
      e.y += e.vy;
      if(rectsOverlap(e, player)){
        ents.enemies.splice(i,1);
        lives--; document.getElementById('lives').textContent = lives;
        playSfx('hit');
        if(lives <= 0) gameOver();
      } else if(e.y > H) ents.enemies.splice(i,1);
    }
    // stars
    for(let i=ents.stars.length-1;i>=0;i--){
      const s = ents.stars[i];
      s.y += s.vy;
      if(rectsOverlap(s, player)){
        ents.stars.splice(i,1);
        score += 10; document.getElementById('score').textContent = score;
        playSfx('collect');
        if(score >= level*100){ level++; document.getElementById('level').textContent = level; }
      } else if(s.y > H) ents.stars.splice(i,1);
    }
    // bullets
    for(let i=ents.bullets.length-1;i>=0;i--){
      const b = ents.bullets[i];
      b.y += b.vy;
      if(b.y + b.h < 0){ ents.bullets.splice(i,1); continue; }
      for(let j=ents.enemies.length-1;j>=0;j--){
        const e = ents.enemies[j];
        if(rectsOverlap(b,e)){
          ents.enemies.splice(j,1);
          ents.bullets.splice(i,1);
          score += 15; document.getElementById('score').textContent = score;
          playSfx('explode');
          break;
        }
      }
    }
  }

  // Draw
  function draw(){
    // clear
    ctx.clearRect(0,0,W,H);
    // subtle grid / glow
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    for(let i=0;i<W;i+=40) ctx.fillRect(i,0,1,H);
    // player (neon capsule)
    ctx.save();
    // glow
    ctx.shadowBlur = 18; ctx.shadowColor = 'rgba(14,165,255,0.6)';
    ctx.fillStyle = '#0ea5ff';
    roundRect(ctx, player.x, player.y, player.w, player.h, 10, true, false);
    ctx.restore();

    // bullets
    ctx.fillStyle = '#fff';
    ents.bullets.forEach(b => roundRect(ctx,b.x,b.y,b.w,b.h,3,true,false));

    // enemies (red)
    ctx.fillStyle = '#ff6b6b';
    ents.enemies.forEach(e => {
      ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(255,107,107,0.18)';
      roundRect(ctx,e.x,e.y,e.w,e.h,6,true,false);
      ctx.restore();
    });

    // stars (neon gold)
    ents.stars.forEach(s => {
      drawStar(ctx, s.x + s.w/2, s.y + s.h/2, 5, s.w/2, s.w/4);
    });
  }

  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    if(r===undefined) r=6;
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius){
    ctx.save();
    ctx.beginPath();
    let rot = Math.PI / 2 * 3;
    let x = cx, y = cy;
    let step = Math.PI / spikes;
    ctx.moveTo(cx, cy - outerRadius);
    for(let i=0;i<spikes;i++){
      x = cx + Math.cos(rot) * outerRadius;
      y = cy + Math.sin(rot) * outerRadius;
      ctx.lineTo(x,y);
      rot += step;

      x = cx + Math.cos(rot) * innerRadius;
      y = cy + Math.sin(rot) * innerRadius;
      ctx.lineTo(x,y);
      rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(255,209,102,0.9)';
    ctx.fillStyle = 'rgba(255,209,102,0.95)';
    ctx.fill();
    ctx.restore();
  }

  // Loop
  function loop(){
    update(); draw();
    requestAnimationFrame(loop);
  }
  // start loop
  loop();

  // Intro & controls
  const intro = document.getElementById('intro');
  const startBtn = document.getElementById('startBtn');
  const skipBtn = document.getElementById('skipBtn');
  const muteBtn = document.getElementById('muteToggle');
  const pauseBtn = document.getElementById('pauseToggle');
  let muted = false;

  muteBtn.addEventListener('click', ()=> {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇 Выключено' : '🔊 Звук';
  });

  // Difficulty selection buttons
  document.querySelectorAll('.diff').forEach(b => {
    b.addEventListener('click', (e) => {
      document.querySelectorAll('.diff').forEach(x => x.style.outline = 'none');
      e.currentTarget.style.outline = '3px solid rgba(255,255,255,0.06)';
      difficulty = e.currentTarget.getAttribute('data-diff') || 'medium';
      startBtn.disabled = false;
      // small visual feedback
      startBtn.textContent = 'Начать (' + difficulty.charAt(0).toUpperCase() + difficulty.slice(1) + ')';
    });
  });

  startBtn.addEventListener('click', async () => {
    intro.style.opacity = 0; intro.style.transform = 'scale(.98)';
    setTimeout(()=> intro.style.display = 'none', 500);
    playIntro();
    await sleep(2200);
    startGame();
  });
  skipBtn.addEventListener('click', ()=> {
    intro.style.display = 'none';
    startGame();
  });

  function startGame(){
    running = true; paused = false;
    score = 0; level = 1; lives = 3;
    ents.enemies = []; ents.stars = []; ents.bullets = [];
    document.getElementById('score').textContent = 0;
    document.getElementById('level').textContent = 1;
    document.getElementById('lives').textContent = 3;
    // update player position centered
    setTimeout(()=> {
      resize();
      player.x = (canvas.getBoundingClientRect().width - player.w)/2;
    }, 60);
  }

  function gameOver(){
    running = false;
    playSfx('gameover');
    alert('Игра окончена! Очки: ' + score);
  }

  // Pause toggle
  if (pauseBtn) {
    pauseBtn.addEventListener('click', () => {
      if (!running) {
        alert('Игра ещё не запущена. Выбери уровень и нажми «Начать игру».'); 
        return;
      }
      paused = !paused;
      pauseBtn.textContent = paused ? '▶️ Продолжить' : '⏸️ Пауза';
    });
  }

  // Utilities
  function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

  // Audio: simple synthesized intro + sfx via WebAudio
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function ensureAudio(){
    if(audioCtx) return audioCtx;
    audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playTone(freq, time=0.2, type='sine', when=0){
    if(muted) return;
    const ac = ensureAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = 0;
    o.connect(g); g.connect(ac.destination);
    const now = ac.currentTime + when;
    g.gain.linearRampToValueAtTime(0.0001, now);
    g.gain.linearRampToValueAtTime(0.12, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, now + time);
    o.start(now); o.stop(now + time + 0.02);
  }

  function playIntro(){
    if(muted) return;
    playTone(440,0.15,'sine',0);
    playTone(550,0.15,'sine',0.14);
    playTone(660,0.18,'sine',0.28);
    playTone(880,0.28,'sine',0.48);
  }

  function playSfx(name){
    if(muted) return;
    const ac = ensureAudio();
    const now = ac.currentTime;
    if(name === 'collect'){
      playTone(880,0.08,'triangle',0);
      playTone(1100,0.12,'sine',0.06);
    } else if(name === 'hit'){
      playTone(180,0.22,'sawtooth',0);
    } else if(name === 'explosion' || name === 'explode'){
      playTone(120,0.16,'sawtooth',0);
      playTone(60,0.24,'sine',0.04);
    } else if(name === 'shoot'){
      playTone(1200,0.06,'square',0);
    } else if(name === 'gameover'){
      playTone(220,0.28,'sine',0);
      playTone(130,0.4,'sine',0.12);
    }
  }

  // Download button
  document.getElementById('download').addEventListener('click', () => {
    const html = '<!doctype html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'svoya-igra-neon-levels.html';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=> URL.revokeObjectURL(url),1000);
  });

  // start hidden canvas resize and initial size
  setTimeout(() => {
    resize();
    // center player
    player.x = (canvas.getBoundingClientRect().width - player.w)/2;
  }, 60);

  // Home (Menu) button
  const homeBtn = document.getElementById('homeBtn');
  if (homeBtn) {
    homeBtn.addEventListener('click', () => {
      if (!intro || !document.body.contains(intro)) return;
      // Stop game
      running = false;
      paused = false;
      ents.enemies = [];
      ents.stars = [];
      ents.bullets = [];
      score = 0; level = 1; lives = 3;
      document.getElementById('score').textContent = 0;
      document.getElementById('level').textContent = 1;
      document.getElementById('lives').textContent = 3;
      // Show intro again
      intro.style.display = 'flex';
      intro.style.opacity = 1;
      intro.style.transform = 'scale(1)';
      playIntro();
    });
  }

})();
</script>
</body>
</html>
